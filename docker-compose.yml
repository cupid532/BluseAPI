services:
  bluseapi:
    image: ghcr.io/arron196/cliproxyapi:latest
    container_name: bluseapi
    restart: unless-stopped
    ports:
      - "127.0.0.1:3111:8080"
    volumes:
      - ./data:/root/.cli-proxy-api
      - ./data/config.yaml:/CLIProxyAPI/config.yaml:ro
    environment:
      TZ: Asia/Shanghai
