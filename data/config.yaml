host: "0.0.0.0"
port: 8080

tls:
  enable: false
  cert: ""
  key: ""

remote-management:
  allow-remote: true
  secret-key: "REDACTED_SET_ON_SERVER"
  disable-control-panel: false
  panel-github-repository: "https://github.com/router-for-me/Cli-Proxy-API-Management-Center"

auth-dir: "/root/.cli-proxy-api"

api-keys:
  - "REPLACE_WITH_REAL_API_KEY"

debug: false

pprof:
  enable: false
  addr: "127.0.0.1:8316"

auth-maintenance:
  enable: true
  scan-interval-seconds: 120
  delete-interval-seconds: 2
  delete-status-codes: [401, 429]
  delete-quota-exceeded: false
  quota-strike-threshold: 6

commercial-mode: false
logging-to-file: false
logs-max-total-size-mb: 0
error-logs-max-files: 10
usage-statistics-enabled: true
usage-statistics-persist-interval-seconds: 30
proxy-url: ""
force-model-prefix: false
passthrough-headers: false
request-retry: 3
max-retry-credentials: 0
max-invalid-request-retries: 0
max-retry-interval: 30
quota-exceeded:
  switch-project: true
  switch-preview-model: true
routing:
  strategy: "round-robin"
ws-auth: false
nonstream-keepalive-interval: 0
